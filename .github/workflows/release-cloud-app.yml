name: Release cloud APP image

on:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Derive image coordinates
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^app-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "APP release tag must look like app-v0.1.0" >&2
            exit 1
          fi
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/onyxclaw-app"
          artifact="onyxclaw-app-${GITHUB_REF_NAME}-linux-amd64-docker"
          {
            echo "tag=${GITHUB_REF_NAME}"
            echo "image_ref=${image}:${GITHUB_REF_NAME}"
            echo "artifact=${artifact}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Step A: build once and push the registry image with provenance + SBOM
      # so GHCR consumers receive supply-chain attestations.
      - name: Build and push cloud APP to GHCR
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/alicloud-app/Dockerfile
          push: true
          tags: ${{ steps.release.outputs.image_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # Step B: separate build that emits a Docker-format tarball
      # (manifest.json + repositories + layer tarballs) loadable on any
      # Docker Engine >= 24.0 via `docker load`. We MUST NOT combine this
      # with step A in a single multi-output build, because the `docker`
      # exporter refuses to serialise the manifest list produced for the
      # registry target:
      #
      #   ERROR: failed to build: docker exporter does not support
      #   exporting manifest lists, use the oci exporter instead
      #
      # The GHA cache from step A keeps the rebuild cheap. Provenance and
      # SBOM are turned off for step B because they reintroduce
      # manifest-list packaging.
      - name: Build Docker-format archive for multi-cloud distribution
        id: archive
        uses: docker/build-push-action@f9f3042f7e2789586610d8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/alicloud-app/Dockerfile
          load: true
          tags: onyxclaw-app:archive-build
          outputs: type=docker,dest=/tmp/${{ steps.release.outputs.artifact }}.tar
          cache-from: type=gha

      - name: Prepare release assets
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_REF: ${{ steps.release.outputs.image_ref }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          ARCHIVE_NAME: ${{ steps.release.outputs.artifact }}
        run: |
          set -euo pipefail
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Build did not return a valid registry digest." >&2
            exit 1
          fi

          mkdir -p release
          # Docker-format tarball (manifest.json + repositories + layer tarballs)
          # is directly loadable on any Docker Engine >= 24.0 via `docker load`.
          # Multi-cloud environments can mirror the archive to ACR / SWR / GCR /
          # ECR without re-tagging or re-pulling from GHCR.
          gzip -9 < "/tmp/${ARCHIVE_NAME}.tar" > "release/${ARCHIVE_NAME}.tar.gz"
          archive_size="$(stat -c '%s' "release/${ARCHIVE_NAME}.tar.gz")"
          if (( archive_size >= 2147483648 )); then
            echo "Compressed Docker archive exceeds GitHub's 2 GiB per-asset limit." >&2
            exit 1
          fi

          docker buildx imagetools inspect "${IMAGE_REF}" > release/image-manifest.txt
          cat > release/image-reference.txt <<EOF
          release=${RELEASE_TAG}
          image=${IMAGE_REF}
          digest=${IMAGE_DIGEST}
          immutable_image=${IMAGE_REF%@*}@${IMAGE_DIGEST}
          platform=linux/amd64
          source_commit=${GITHUB_SHA}
          loadable_by=Docker Engine 24.x (docker load)
          EOF
          (
            cd release
            sha256sum "${ARCHIVE_NAME}.tar.gz" image-manifest.txt image-reference.txt > checksums.sha256
          )
          cat > release/release-notes.md <<EOF
          ## OnyxClaw cloud APP ${RELEASE_TAG}

          Registry image:

          \`${IMAGE_REF}\`

          Immutable image:

          \`${IMAGE_REF%@*}@${IMAGE_DIGEST}\`

          The attached \`${ARCHIVE_NAME}.tar.gz\` is a Docker-format archive
          (manifest.json + layer tarballs) that loads on any Docker Engine 24.x host:

          \`\`\`bash
          docker load -i ${ARCHIVE_NAME}.tar.gz
          docker images --digests | grep onyxclaw-app
          \`\`\`

          Mirror to other registries with \`docker tag\` + \`docker push\`, or use
          Skopeo (\`skopeo copy docker-archive:${ARCHIVE_NAME}.tar.gz ...\`) for
          registries that do not accept plain \`docker push\`.
          EOF

      - name: Create or refresh GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release/* --clobber
            gh release edit "${RELEASE_TAG}" --notes-file release/release-notes.md
          else
            gh release create "${RELEASE_TAG}" release/* \
              --verify-tag \
              --title "OnyxClaw cloud APP ${RELEASE_TAG}" \
              --notes-file release/release-notes.md
          fi

      - name: Summarize immutable image
        shell: bash
        run: |
          {
            echo "### Published cloud APP image"
            echo
            echo '\`${{ steps.release.outputs.image_ref }}@${{ steps.push.outputs.digest }}\`'
            echo
            echo "The matching Docker-format archive (\`${{ steps.release.outputs.artifact }}.tar.gz\`) and checksums are attached to GitHub Release ${{ steps.release.outputs.tag }}. Use \`docker load -i <archive>.tar.gz\` on any Docker 24.x host."
          } >> "${GITHUB_STEP_SUMMARY}"
